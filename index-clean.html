<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国演义 · 诺兰宇宙档案馆（修复版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: #0A0A0A; color: #E5E0D5; }
        .heading-serif { font-family: 'Noto Serif SC', Georgia, serif; }
    </style>
</head>
<body class="bg-[#0A0A0A] text-[#E5E0D5]">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="text-5xl heading-serif mb-8 text-center">人物档案馆（已修复）</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="character-grid">
            <!-- 示例卡片 -->
            <div onclick="openDossier('zhugeliang')" class="bg-[#111] p-6 rounded-2xl cursor-pointer hover:bg-[#1a1a1a]">
                <div class="text-[#C5A26E]">蜀</div>
                <div class="text-3xl font-semibold mt-2">诸葛亮</div>
                <div class="text-sm text-white/60">孔明 · 卧龙</div>
                <div class="mt-4 text-xs text-white/70">鞠躬尽瘁，死而后已。六出祁山，智绝天下。</div>
            </div>

            <div onclick="openDossier('guanyu')" class="bg-[#111] p-6 rounded-2xl cursor-pointer hover:bg-[#1a1a1a]">
                <div class="text-[#C5A26E]">蜀</div>
                <div class="text-3xl font-semibold mt-2">关羽</div>
                <div class="text-sm text-white/60">云长 · 武圣</div>
                <div class="mt-4 text-xs text-white/70">温酒斩华雄，千里走单骑，水淹七军。</div>
            </div>

            <div onclick="openDossier('caocao')" class="bg-[#111] p-6 rounded-2xl cursor-pointer hover:bg-[#1a1a1a]">
                <div class="text-[#C5A26E]">魏</div>
                <div class="text-3xl font-semibold mt-2">曹操</div>
                <div class="text-sm text-white/60">孟德 · 魏武帝</div>
                <div class="mt-4 text-xs text-white/70">宁教我负天下人，休教天下人负我。</div>
            </div>

            <!-- 可继续添加其他卡片 -->
        </div>

        <div class="text-center mt-8 text-xs text-white/50">
            调试提示：按 F12 打开 Console 查看是否有红色错误<br>
            当前为修复后的干净版本（已分离 script-clean.js）
        </div>
    </div>

    <!-- 模态窗口 -->
    <div id="dossier-modal" onclick="if (event.target.id === 'dossier-modal') closeDossier()" 
         class="hidden fixed inset-0 z-[70] bg-black/95 flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="w-full max-w-4xl max-h-[90vh] overflow-y-auto bg-[#0C0C0C] rounded-3xl border border-[#C5A26E]/20">
            <div id="dossier-content"></div>
        </div>
    </div>

    <script src="script-clean.js"></script>
</body>
</html>
